experiment:
  name: phase2_sparc_ltm_full
  seed: 42

dataset:
  name: locomo
  path: data/raw/locomo10.json
  split: all

embedding:
  provider: sentence_transformers
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  cache_dir: data/processed/embedding_cache

phase2:
  # Memory extraction
  enable_llm_extraction: true
  candidate_detector_threshold: 0.35  # 0.0 = always call LLM

  # Contradiction detection
  enable_contradiction_llm: true
  contradiction_similarity_threshold: 0.85

  # Retrieval pipeline
  enable_reranker: true
  enable_compressed_label_search: true
  enable_graph_traversal_worker: true
  enable_forgotten_tier_fallback: true

  # Lifecycle
  storage_cap: 500
  transition_trigger_pct: 0.90
  enable_compression_llm: false  # Use simple label generation for now

  # Caching
  cache_dir: data/processed/phase2_cache

generation:
  provider: anthropic
  model_name: claude-3-5-sonnet-latest
  temperature: 0
  max_output_tokens: 120
  cache_dir: data/processed/llm_cache
  enabled: true

evaluation:
  compute_f1: true
  compute_exact_match: true
  compute_evidence_recall: true
  compute_latency: true
  compute_token_usage: true

output:
  dir: results
