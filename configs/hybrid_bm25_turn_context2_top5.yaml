experiment:
  name: hybrid_bm25_turn_context2_top5
  seed: 42

dataset:
  name: locomo
  path: data/raw/locomo10.json
  split: all

chunking:
  strategy: turn
  window_size: 1
  context_window: 2          # ±2 adjacent turns added as [Prior]/[Next] context
  include_speaker: true
  include_timestamp: true
  include_session_id: true

embedding:
  provider: sentence_transformers
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 64
  normalize_embeddings: true
  cache_dir: data/processed/embedding_cache

retrieval:
  index_type: faiss
  top_k: 5
  candidate_k: 30            # each retriever fetches 30 candidates before RRF fusion
  same_conversation_only: true
  hybrid_bm25: true          # enable BM25 + Dense RRF fusion

generation:
  enabled: false             # retrieval-only for now

evaluation:
  compute_f1: false
  compute_exact_match: false
  compute_evidence_recall: true
  compute_latency: true
  compute_token_usage: false

output:
  dir: results
